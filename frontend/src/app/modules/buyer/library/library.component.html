<div class="flex flex-col flex-auto min-w-0 p-6 sm:p-10">
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between w-full">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight leading-none">Ma Bibliothèque</h2>
            <div class="mt-0.5 text-secondary">Accédez à tous les morceaux que vous avez achetés.</div>
        </div>
    </div>

    <div class="mt-8 bg-card shadow rounded-2xl overflow-hidden">
        <table mat-table [dataSource]="songs" class="w-full">
            <ng-container matColumnDef="title">
                <th mat-header-cell *matHeaderCellDef> Titre </th>
                <td mat-cell *matCellDef="let song"> {{song.title}} </td>
            </ng-container>

            <ng-container matColumnDef="artist">
                <th mat-header-cell *matHeaderCellDef> Artiste </th>
                <td mat-cell *matCellDef="let song"> {{song.artist?.name}} </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let song" class="text-right">
                    <button mat-icon-button color="primary" (click)="download(song.id)">
                        <mat-icon [svgIcon]="'heroicons_outline:arrow-down-tray'"></mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <div *ngIf="songs.length === 0" class="p-8 text-center text-secondary">
            Vous n'avez pas encore acheté de musique.
        </div>
    </div>
</div>
