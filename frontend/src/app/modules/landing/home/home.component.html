<div class="flex flex-col items-center justify-start w-full min-h-full p-6 sm:p-10 bg-card">
    <div class="flex flex-col items-center w-full max-w-7xl">
        <div class="flex flex-col items-center text-center">
            <h1 class="text-4xl font-extrabold tracking-tight leading-none">Musician Storefront</h1>
            <p class="mt-4 text-xl text-secondary max-w-2xl">Découvrez et achetez les meilleurs morceaux de vos artistes préférés.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mt-12 w-full">
            <ng-container *ngFor="let song of songs">
                <mat-card class="flex flex-col h-full shadow-md hover:shadow-lg transition-shadow duration-150">
                    <img mat-card-image class="h-48 object-cover" [src]="song.cover_url || 'assets/images/cards/01.jpg'" [alt]="song.title">
                    <mat-card-content class="flex flex-col flex-auto p-4">
                        <div class="text-lg font-bold truncate">{{song.title}}</div>
                        <div class="text-secondary truncate">{{song.artist?.name}}</div>
                        <div class="mt-2 text-primary font-semibold text-xl">{{song.price}} {{song.currency_code}}</div>
                    </mat-card-content>
                    <mat-card-actions class="p-4 pt-0">
                        <button mat-flat-button color="primary" class="w-full" (click)="addToCart(song)">
                            <mat-icon class="mr-2 icon-size-5" [svgIcon]="'heroicons_outline:shopping-cart'"></mat-icon>
                            Acheter
                        </button>
                    </mat-card-actions>
                </mat-card>
            </ng-container>
        </div>

        <div *ngIf="songs.length === 0" class="mt-12 text-center">
            <mat-icon class="icon-size-16 text-hint" [svgIcon]="'heroicons_outline:musical-note'"></mat-icon>
            <p class="mt-4 text-secondary text-lg">Aucun morceau disponible pour le moment.</p>
        </div>
    </div>
</div>
