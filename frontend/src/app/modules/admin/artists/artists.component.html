<div class="flex flex-col flex-auto min-w-0">
    <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-6 sm:py-8 sm:px-10 border-b bg-card dark:bg-transparent">
        <div class="flex-auto">
            <div class="text-4xl font-extrabold tracking-tight">Artists</div>
            <div class="flex items-center mt-0.5 font-medium text-secondary">
                Manage artist star rankings
            </div>
        </div>
    </div>

    <div class="flex-auto p-6 sm:p-10">
        <div class="bg-card shadow rounded-2xl overflow-hidden">
            <table mat-table [dataSource]="artists" class="w-full">
                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef>Name</th>
                    <td mat-cell *matCellDef="let artist">{{artist.name}}</td>
                </ng-container>

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>Email</th>
                    <td mat-cell *matCellDef="let artist">{{artist.email}}</td>
                </ng-container>

                <ng-container matColumnDef="country">
                    <th mat-header-cell *matHeaderCellDef>Country</th>
                    <td mat-cell *matCellDef="let artist">{{artist.country || 'N/A'}}</td>
                </ng-container>

                <ng-container matColumnDef="star_ranking">
                    <th mat-header-cell *matHeaderCellDef>Star Ranking</th>
                    <td mat-cell *matCellDef="let artist">
                        <mat-form-field class="fuse-mat-dense w-20">
                            <mat-select [value]="artist.star_ranking" (selectionChange)="updateStar(artist.id, $event.value)">
                                <mat-option *ngFor="let star of starLevels" [value]="star">
                                    {{star}}
                                </mat-option>
                            </mat-select>
                        </mat-form-field>
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef>Actions</th>
                    <td mat-cell *matCellDef="let artist">
                        <!-- Add more actions if needed -->
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </div>
</div>
