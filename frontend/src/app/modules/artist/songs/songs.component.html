<div class="flex flex-col flex-auto min-w-0">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-6 sm:py-8 sm:px-10 border-b bg-card dark:bg-transparent">
        <div class="flex-1 min-w-0">
            <!-- Breadcrumbs -->
            <div class="flex flex-wrap items-center font-medium">
                <div>
                    <a class="whitespace-nowrap text-primary-500">Artist</a>
                </div>
                <div class="flex items-center ml-1 whitespace-nowrap">
                    <mat-icon
                        class="icon-size-3 text-secondary"
                        [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
                    <a class="ml-1 text-secondary">Songs</a>
                </div>
            </div>
            <!-- Title -->
            <div class="mt-2">
                <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate">
                    Manage Your Songs
                </h2>
            </div>
        </div>
        <!-- Actions -->
        <div class="flex shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
            <button
                mat-flat-button
                [color]="'primary'"
                (click)="toggleUploadForm()">
                <mat-icon
                    class="icon-size-5 mr-2"
                    [svgIcon]="'heroicons_solid:plus'"></mat-icon>
                <span>Upload New Song</span>
            </button>
        </div>
    </div>

    <!-- Main -->
    <div class="flex-auto p-6 sm:p-10">

        <!-- Upload Form -->
        <div class="bg-card shadow rounded-2xl p-8 mb-8" *ngIf="showUploadForm">
            <h3 class="text-xl font-bold mb-6">Upload Song</h3>
            <form [formGroup]="songForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <mat-form-field class="w-full">
                    <mat-label>Title</mat-label>
                    <input matInput formControlName="title">
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Genre</mat-label>
                    <input matInput formControlName="genre">
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Price</mat-label>
                    <input type="number" matInput formControlName="price">
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Currency</mat-label>
                    <mat-select formControlName="currency_code">
                        <mat-option value="XOF">XOF</mat-option>
                        <mat-option value="USD">USD</mat-option>
                        <mat-option value="EUR">EUR</mat-option>
                    </mat-select>
                </mat-form-field>

                <div class="sm:col-span-2 flex justify-end gap-4">
                    <button type="button" mat-button (click)="toggleUploadForm()">Cancel</button>
                    <button type="submit" mat-flat-button [color]="'primary'" [disabled]="songForm.invalid">Save Draft</button>
                </div>
            </form>
        </div>

        <!-- Songs Table -->
        <div class="bg-card shadow rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table mat-table [dataSource]="songs" class="w-full">
                    <ng-container matColumnDef="title">
                        <th mat-header-cell *matHeaderCellDef> Title </th>
                        <td mat-cell *matCellDef="let song"> {{song.title}} </td>
                    </ng-container>

                    <ng-container matColumnDef="status">
                        <th mat-header-cell *matHeaderCellDef> Status </th>
                        <td mat-cell *matCellDef="let song">
                            <span class="px-2 py-1 text-xs font-semibold rounded-full"
                                  [ngClass]="{
                                    'bg-green-100 text-green-800': song.status === 'published',
                                    'bg-yellow-100 text-yellow-800': song.status === 'draft',
                                    'bg-gray-100 text-gray-800': song.status === 'archived'
                                  }">
                                {{song.status | uppercase}}
                            </span>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="price">
                        <th mat-header-cell *matHeaderCellDef> Price </th>
                        <td mat-cell *matCellDef="let song"> {{song.price}} {{song.currency_code}} </td>
                    </ng-container>

                    <ng-container matColumnDef="genre">
                        <th mat-header-cell *matHeaderCellDef> Genre </th>
                        <td mat-cell *matCellDef="let song"> {{song.genre}} </td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                        <td mat-cell *matCellDef="let song">
                            <button mat-icon-button>
                                <mat-icon class="icon-size-5" [svgIcon]="'heroicons_solid:pencil'"></mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>
            </div>
        </div>
    </div>
</div>
