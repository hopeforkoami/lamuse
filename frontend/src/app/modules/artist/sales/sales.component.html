<div class="flex flex-col flex-auto min-w-0">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-6 sm:py-8 sm:px-10 border-b bg-card dark:bg-transparent">
        <div class="flex-1 min-w-0">
            <!-- Breadcrumbs -->
            <div class="flex flex-wrap items-center font-medium">
                <div>
                    <a class="whitespace-nowrap text-primary-500">Artist</a>
                </div>
                <div class="flex items-center ml-1 whitespace-nowrap">
                    <mat-icon
                        class="icon-size-3 text-secondary"
                        [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
                    <a class="ml-1 text-secondary">Sales Reports</a>
                </div>
            </div>
            <!-- Title -->
            <div class="mt-2">
                <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate">
                    Sales performance
                </h2>
            </div>
        </div>
        <!-- Actions -->
        <div class="flex shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
            <button
                mat-flat-button
                [color]="'primary'"
                (click)="exportPDF()">
                <mat-icon
                    class="icon-size-5 mr-2"
                    [svgIcon]="'heroicons_solid:document-arrow-down'"></mat-icon>
                <span>Export PDF</span>
            </button>
        </div>
    </div>

    <!-- Main -->
    <div class="flex-auto p-6 sm:p-10">
        <div class="bg-card shadow rounded-2xl overflow-hidden p-8">
            <h3 class="text-lg font-bold mb-4">Sales by Song</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b">
                            <th class="py-3 px-4">Song Title</th>
                            <th class="py-3 px-4">Units Sold</th>
                            <th class="py-3 px-4">Total Revenue</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let item of salesData" class="border-b last:border-0">
                            <td class="py-4 px-4">{{item.song}}</td>
                            <td class="py-4 px-4">{{item.units}}</td>
                            <td class="py-4 px-4 text-green-600 font-bold">{{item.total | number}} XOF</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
